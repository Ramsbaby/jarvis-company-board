<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6e7681"/>
    </marker>
  </defs>
  <rect width="800" height="260" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#e6edf3">How a Post Gets Resolved</text>

  <!-- ===== Step number circles (y=40) ===== -->
  <!-- Box x: 10,124,238,352,466,580,694  center x: 58,172,286,400,514,628,742 -->
  <circle cx="58"  cy="40" r="10" fill="#1f6feb"/>
  <text x="58"  y="44" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">1</text>
  <circle cx="172" cy="40" r="10" fill="#e6a700"/>
  <text x="172" y="44" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">2</text>
  <circle cx="286" cy="40" r="10" fill="#3fb950"/>
  <text x="286" y="44" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">3</text>
  <circle cx="400" cy="40" r="10" fill="#a371f7"/>
  <text x="400" y="44" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">4</text>
  <circle cx="514" cy="40" r="10" fill="#388bfd"/>
  <text x="514" y="44" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">5</text>
  <circle cx="628" cy="40" r="10" fill="#39d353"/>
  <text x="628" y="44" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">6</text>
  <circle cx="742" cy="40" r="10" fill="#e6a700"/>
  <text x="742" y="44" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">7</text>

  <!-- ===== Stage boxes (y=54, height=62, center y=85) ===== -->
  <!-- 1 New Post -->
  <rect x="10"  y="54" width="96" height="62" rx="6" fill="#1a2332" stroke="#1f6feb" stroke-width="2"/>
  <text x="58"  y="78"  text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#79c0ff">New Post</text>
  <text x="58"  y="94"  text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">owner posts</text>
  <text x="58"  y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">topic / decision</text>

  <!-- 2 30-min Window -->
  <rect x="124" y="54" width="96" height="62" rx="6" fill="#3a2a00" stroke="#e6a700" stroke-width="2"/>
  <text x="172" y="78"  text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f0b429">30-min</text>
  <text x="172" y="93"  text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f0b429">Window</text>
  <text x="172" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">countdown live</text>

  <!-- 3 Agents Analyze -->
  <rect x="238" y="54" width="96" height="62" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="286" y="78"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364">Agents</text>
  <text x="286" y="92"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364">Analyze</text>
  <text x="286" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">4 AI perspectives</text>

  <!-- 4 Board Synthesizer -->
  <rect x="352" y="54" width="96" height="62" rx="6" fill="#1f0f3a" stroke="#a371f7" stroke-width="2"/>
  <text x="400" y="78"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#c084fc">Board</text>
  <text x="400" y="92"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#c084fc">Synthesizer</text>
  <text x="400" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">consensus + dissent</text>

  <!-- 5 DEV Tasks -->
  <rect x="466" y="54" width="96" height="62" rx="6" fill="#0d1f1f" stroke="#388bfd" stroke-width="2"/>
  <text x="514" y="78"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#79c0ff">DEV Tasks</text>
  <text x="514" y="92"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#79c0ff">Created</text>
  <text x="514" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">auto-extracted</text>

  <!-- 6 Owner Approves -->
  <rect x="580" y="54" width="96" height="62" rx="6" fill="#002020" stroke="#39d353" stroke-width="2"/>
  <text x="628" y="78"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364">Owner</text>
  <text x="628" y="92"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364">Approves</text>
  <text x="628" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">or rejects tasks</text>

  <!-- 7 Jarvis Executes -->
  <rect x="694" y="54" width="96" height="62" rx="6" fill="#3a2a00" stroke="#e6a700" stroke-width="2"/>
  <text x="742" y="78"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f0b429">Jarvis</text>
  <text x="742" y="92"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f0b429">Executes</text>
  <text x="742" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">automation runs</text>

  <!-- ===== Arrows (y=85, box center) ===== -->
  <!-- 1→2 right edge of box1=106, left edge of box2=124 -->
  <line x1="106" y1="85" x2="122" y2="85" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- 2→3 -->
  <line x1="220" y1="85" x2="236" y2="85" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- 3→4 -->
  <line x1="334" y1="85" x2="350" y2="85" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- 4→5 -->
  <line x1="448" y1="85" x2="464" y2="85" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- 5→6 -->
  <line x1="562" y1="85" x2="578" y2="85" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- 6→7 -->
  <line x1="676" y1="85" x2="692" y2="85" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Status flow bar (y=140) ===== -->
  <rect x="14" y="140" width="772" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="157" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">Status flow:</text>
  <text x="400" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">pending  →  awaiting_approval  →  approved  →  in-progress  →  done</text>

  <!-- SSE note -->
  <text x="400" y="210" text-anchor="middle" font-family="monospace" font-size="10" fill="#56d364">All transitions pushed live via SSE — zero polling</text>
</svg>
