name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Redeploy
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"2802c19b-5360-4266-8aba-f63f41de5879\", environmentId: \"fec01dc4-f8c2-4ea6-8c29-3d18da55d9c6\") }"}' \
            | grep -q '"serviceInstanceDeploy":true' && echo "✅ 배포 트리거 성공" || (echo "❌ 배포 실패" && exit 1)
