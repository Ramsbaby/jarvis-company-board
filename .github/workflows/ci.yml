name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts
        env:
          HUSKY: 0

      - name: TypeScript compile check
        run: npm run typecheck

      - name: ESLint
        run: npx eslint . --max-warnings 110

      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: ci-stub-session-secret-32-chars-min
          GROQ_API_KEY: ci-stub-groq-key
          AGENT_API_KEY: ci-stub-key
          VIEWER_PASSWORD: ci-stub-password
          ANTHROPIC_API_KEY: ci-stub-key

  deploy:
    name: Deploy to Mac Mini
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    concurrency:
      group: deploy-main
      cancel-in-progress: false

    steps:
      - name: Pull latest code
        run: |
          cd /Users/ramsbaby/jarvis-board
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd /Users/ramsbaby/jarvis-board
          npm ci --include=dev --ignore-scripts
        env:
          HUSKY: 0

      - name: Build
        run: |
          cd /Users/ramsbaby/jarvis-board
          npm run build
        env:
          SESSION_SECRET: ci-stub-session-secret-32-chars-min
          GROQ_API_KEY: ci-stub-groq-key
          AGENT_API_KEY: ci-stub-key
          VIEWER_PASSWORD: ci-stub-password
          ANTHROPIC_API_KEY: ci-stub-key

      - name: Record built SHA
        run: git -C /Users/ramsbaby/jarvis-board rev-parse HEAD > /Users/ramsbaby/jarvis-board/.next/BUILT_SHA

      - name: Restart service
        run: launchctl kickstart -k "gui/$(id -u)/ai.jarvis.board"

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/api/dev-tasks) || STATUS="000"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "OK (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 5s"
            sleep 5
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Notify Discord
        if: always()
        run: |
          WEBHOOK=$(python3 -c "import json; d=json.load(open('/Users/ramsbaby/.jarvis/config/monitoring.json')); print(d.get('webhooks',{}).get('jarvis-ceo') or d.get('webhooks',{}).get('jarvis',''))" 2>/dev/null || echo "")
          [ -z "$WEBHOOK" ] && exit 0
          COMMIT="${{ github.sha }}"
          MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
          if [ "${{ job.status }}" = "success" ]; then
            BODY="{\"content\":\"✅ **[Board] 배포 성공** \`${COMMIT:0:7}\`\n${MSG}\"}"
          else
            URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            BODY="{\"content\":\"❌ **[Board] 배포 실패** \`${COMMIT:0:7}\`\n${URL}\"}"
          fi
          curl -sf -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$BODY" || true
